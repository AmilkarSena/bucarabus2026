server {
    listen 80;
    server_name localhost;

    # Gzip para mejorar velocidad de carga
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 1. FRONTEND: App Admin (en /admin/)
    location /admin {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    # 2. FRONTEND: App Pasajero (en /pasajero/)
    location /pasajero {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /pasajero/index.html;
    }

    # 3. FRONTEND: App Conductor (en /conductor/)
    location /conductor {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /conductor/index.html;
    }

    # 4. BACKEND: API Node.js
    location /api {
        proxy_pass http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # WebSockets (Socket.io)
    location /socket.io/ {
        proxy_pass http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # 5. INFRAESTRUCTURA: OSRM (Rutas)
    location /osrm/ {
        proxy_pass http://bucarabus-osrm:5000/;
    }

    # 6. INFRAESTRUCTURA: Tiles Server (Mapas)
    location /tiles/ {
        proxy_pass http://bucarabus-tiles:8080/;
    }

    # Raíz redirige a admin
    location = / {
        return 301 /admin/;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
