server {
    listen 80;
    server_name bucarabus.canadacentral.cloudapp.azure.com;

    # Redirigir todo el tráfico HTTP a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name bucarabus.canadacentral.cloudapp.azure.com;

    # Certificados SSL de Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/bucarabus.canadacentral.cloudapp.azure.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bucarabus.canadacentral.cloudapp.azure.com/privkey.pem;

    # Optimización SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    # Gzip para mejorar velocidad de carga
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # 1. FRONTEND: App Admin (en /admin/)
    location /admin {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    # 2. FRONTEND: App Pasajero (en /pasajero/)
    location /pasajero {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /pasajero/index.html;
    }

    # 3. FRONTEND: App Conductor (en /conductor/)
    location /conductor {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /conductor/index.html;
    }

    # 4. BACKEND: API Node.js
    location /api {
        proxy_pass http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # WebSockets (Socket.io)
    location /socket.io/ {
        proxy_pass http://api:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # 5. INFRAESTRUCTURA: OSRM (Rutas)
    location /osrm/ {
        proxy_pass http://osrm:5000/;
    }

    # 6. INFRAESTRUCTURA: Tiles Server (Mapas)
    location /tiles/ {
        proxy_pass http://tiles:8080/;
    }

    # Raíz redirige a admin
    location = / {
        return 301 /admin/;
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
